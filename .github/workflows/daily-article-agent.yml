name: Daily Qsen article calendar publisher

on:
  schedule:
    # 09:00 Europe/Moscow is 06:00 UTC.
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      article_date:
        description: 'Calendar date to publish, YYYY-MM-DD. Empty means current Europe/Moscow date.'
        required: false
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ARTICLE_API_BASE_URL: ${{ secrets.ARTICLE_API_BASE_URL }}
  ARTICLE_ADMIN_TOKEN: ${{ secrets.ARTICLE_ADMIN_TOKEN }}
  INPUT_ARTICLE_DATE: ${{ github.event.inputs.article_date || '' }}

concurrency:
  group: qsen-daily-article-calendar
  cancel-in-progress: false

jobs:
  publish-calendar-day:
    name: Publish calendar article batch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Resolve article date
        id: article-date
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${INPUT_ARTICLE_DATE:-}" ]; then
            article_date="$INPUT_ARTICLE_DATE"
          else
            article_date="$(TZ=Europe/Moscow date +%F)"
          fi

          if ! [[ "$article_date" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
            echo "Invalid article_date: $article_date" >&2
            exit 1
          fi

          batch_dir="BD/article-publish-calendar/$article_date"
          if [ ! -d "$batch_dir" ]; then
            echo "Calendar batch not found: $batch_dir" >&2
            echo "Add 3 RU + 3 EN JSON articles for this date before the scheduled run." >&2
            exit 1
          fi

          echo "article_date=$article_date" >> "$GITHUB_OUTPUT"
          echo "batch_dir=$batch_dir" >> "$GITHUB_OUTPUT"
          echo "Resolved calendar batch: $batch_dir"

      - name: Check required publish secrets
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          for name in ARTICLE_API_BASE_URL ARTICLE_ADMIN_TOKEN; do
            if [ -z "${!name:-}" ]; then
              echo "$name is required." >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Dry run calendar batch
        run: node scripts/article-agent/publish-calendar-batch.mjs --date "${{ steps.article-date.outputs.article_date }}" --dry-run

      - name: Upload calendar article JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: qsen-calendar-articles-${{ steps.article-date.outputs.article_date }}
          path: ${{ steps.article-date.outputs.batch_dir }}
          retention-days: 30

      - name: Publish calendar batch
        run: node scripts/article-agent/publish-calendar-batch.mjs --date "${{ steps.article-date.outputs.article_date }}" --publish --skip-existing

      - name: Build
        run: npm run build

      - name: Verify article HTML files
        run: npm run verify:articles-html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
