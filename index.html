    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Отключаем Service Worker на localhost для разработки
          if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
            navigator.serviceWorker.getRegistrations().then(registrations => {
              registrations.forEach(registration => registration.unregister())
            })
            console.log('SW disabled for localhost')
            return
          }

          let isRefreshing = false

          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (isRefreshing) return
            isRefreshing = true
            window.location.reload()
          })

          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered:', registration)

              const activateUpdate = (worker) => {
                if (worker) {
                  worker.postMessage({ type: 'SKIP_WAITING' })
                }
              }

              if (registration.waiting) {
                activateUpdate(registration.waiting)
              }

              registration.addEventListener('updatefound', () => {
                const installing = registration.installing
                if (!installing) return

                installing.addEventListener('statechange', () => {
                  if (installing.state === 'installed' && navigator.serviceWorker.controller) {
                    activateUpdate(registration.waiting || installing)
                  }
                })
              })

              registration.update()
            })
            .catch((error) => {
              console.error('SW registration failed:', error)
            })
        })
      }

      // Enhanced error logging for mobile debugging
      window.addEventListener('error', (e) => {
        console.error('Global error:', e.message, 'at', e.filename, e.lineno, e.colno)
        // Try to show error on screen for mobile debugging
        if (window.location.search.includes('debug')) {
          const errorDiv = document.createElement('div')
          errorDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:10px;z-index:99999;font-size:12px;'
          errorDiv.textContent = 'ERROR: ' + e.message
          document.body.appendChild(errorDiv)
        }
      })

      window.addEventListener('unhandledrejection', (e) => {
        console.error('Unhandled rejection:', e.reason)
        if (window.location.search.includes('debug')) {
          const errorDiv = document.createElement('div')
          errorDiv.style.cssText = 'position:fixed;top:0;left:0;right:0;background:orange;color:white;padding:10px;z-index:99999;font-size:12px;'
          errorDiv.textContent = 'PROMISE ERROR: ' + (e.reason?.message || e.reason)
          document.body.appendChild(errorDiv)
        }
      })
    </script>
