<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fix QSEN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: white;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }
        .status {
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 14px;
            line-height: 1.6;
        }
        button {
            width: 100%;
            background: white;
            color: #667eea;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 0;
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        .success { background: rgba(16, 185, 129, 0.3); }
        .error { background: rgba(239, 68, 68, 0.3); }
        .info { background: rgba(59, 130, 246, 0.3); }
        #log {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-line { margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 QSEN FIX</h1>

        <div class="status info">
            <strong>Проблема:</strong> GitHub Pages кэширует старую версию.<br>
            <strong>Решение:</strong> Очистить всё и перезагрузить.
        </div>

        <button onclick="fixAll()">🚀 ИСПРАВИТЬ ВСЁ</button>
        <button onclick="testSite()">🧪 ПРОВЕРИТЬ САЙТ</button>
        <button onclick="goHome()">🏠 НА ГЛАВНУЮ</button>

        <div id="log"></div>
    </div>

    <script>
        const log = document.getElementById('log');

        function addLog(msg, type = 'info') {
            const line = document.createElement('div');
            line.className = `log-line ${type}`;
            const time = new Date().toLocaleTimeString();
            line.innerHTML = `<span style="opacity:0.7">[${time}]</span> ${msg}`;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;
        }

        async function fixAll() {
            addLog('🔄 Начинаем исправление...', 'info');

            // 1. Clear Service Workers
            try {
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (let reg of regs) {
                        await reg.unregister();
                        addLog('✓ Service Worker удален', 'success');
                    }
                }
            } catch (e) {
                addLog('✗ SW error: ' + e.message, 'error');
            }

            // 2. Clear all caches
            try {
                if ('caches' in window) {
                    const names = await caches.keys();
                    for (let name of names) {
                        await caches.delete(name);
                        addLog('✓ Кэш удален: ' + name, 'success');
                    }
                }
            } catch (e) {
                addLog('✗ Cache error: ' + e.message, 'error');
            }

            // 3. Clear storage
            try {
                localStorage.clear();
                sessionStorage.clear();
                addLog('✓ Storage очищен', 'success');
            } catch (e) {
                addLog('✗ Storage error: ' + e.message, 'error');
            }

            addLog('✅ ГОТОВО! Теперь перезагрузи страницу', 'success');

            // Auto reload after 2 seconds
            setTimeout(() => {
                addLog('🔄 Перезагрузка через 3 сек...', 'info');
                setTimeout(() => window.location.href = '/?t=' + Date.now(), 3000);
            }, 2000);
        }

        async function testSite() {
            addLog('🧪 Тестирую ресурсы...', 'info');

            const tests = [
                '/assets/index-pkiOKo-I.js',
                '/assets/index-DORtaN37.css'
            ];

            for (let url of tests) {
                try {
                    const r = await fetch(url + '?t=' + Date.now());
                    if (r.ok) {
                        addLog('✓ ' + url, 'success');
                    } else {
                        addLog('✗ ' + url + ' (' + r.status + ')', 'error');
                    }
                } catch (e) {
                    addLog('✗ ' + url + ' ERROR', 'error');
                }
            }
        }

        function goHome() {
            window.location.href = '/?t=' + Date.now();
        }

        // Auto-start
        addLog('Страница загружена', 'info');
        addLog('UA: ' + navigator.userAgent.substring(0, 50) + '...', 'info');
    </script>
</body>
</html>
