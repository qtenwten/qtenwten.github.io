<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug QSEN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            padding: 10px;
            font-size: 14px;
            line-height: 1.4;
        }
        h1 { font-size: 18px; margin-bottom: 10px; color: #333; }
        h2 { font-size: 16px; margin: 15px 0 5px; color: #666; }
        .box {
            background: #f0f0f0;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            word-break: break-all;
        }
        button {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
            margin: 5px 0;
            cursor: pointer;
        }
        .success { color: green; }
        .error { color: red; }
        #log {
            background: #000;
            color: #0f0;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>🔧 QSEN Debug</h1>

    <div class="box">
        <strong>UA:</strong> <span id="ua"></span>
    </div>

    <h2>Actions</h2>
    <button onclick="clearAll()">CLEAR ALL CACHE & SW</button>
    <button onclick="testMain()">TEST MAIN SITE</button>
    <button onclick="window.location.href='/ru'">GO TO /ru</button>

    <h2>Log</h2>
    <div id="log"></div>

    <script>
        const log = document.getElementById('log');
        function addLog(msg) {
            const d = new Date();
            log.innerHTML += `[${d.getHours()}:${d.getMinutes()}:${d.getSeconds()}] ${msg}<br>`;
            log.scrollTop = log.scrollHeight;
            console.log(msg);
        }

        document.getElementById('ua').textContent = navigator.userAgent;
        addLog('Page loaded');

        async function clearAll() {
            addLog('Starting cleanup...');

            // Clear SW
            try {
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations();
                    for (let reg of regs) {
                        await reg.unregister();
                        addLog('SW removed: ' + reg.scope);
                    }
                    if (regs.length === 0) addLog('No SW found');
                }
            } catch (e) {
                addLog('SW error: ' + e.message);
            }

            // Clear caches
            try {
                if ('caches' in window) {
                    const names = await caches.keys();
                    for (let name of names) {
                        await caches.delete(name);
                        addLog('Cache deleted: ' + name);
                    }
                    if (names.length === 0) addLog('No cache found');
                }
            } catch (e) {
                addLog('Cache error: ' + e.message);
            }

            // Clear storage
            try {
                localStorage.clear();
                sessionStorage.clear();
                addLog('Storage cleared');
            } catch (e) {
                addLog('Storage error: ' + e.message);
            }

            addLog('=== DONE ===');
            addLog('Now reload the page');
        }

        async function testMain() {
            addLog('Testing main resources...');

            const tests = [
                '/assets/index-DORtaN37.css',
                '/assets/index-pkiOKo-I.js'
            ];

            for (let url of tests) {
                try {
                    const r = await fetch(url);
                    if (r.ok) {
                        addLog('✓ ' + url);
                    } else {
                        addLog('✗ ' + url + ' (' + r.status + ')');
                    }
                } catch (e) {
                    addLog('✗ ' + url + ' ERROR: ' + e.message);
                }
            }
        }

        // Catch errors
        window.addEventListener('error', (e) => {
            addLog('ERROR: ' + e.message);
        });

        window.addEventListener('unhandledrejection', (e) => {
            addLog('PROMISE ERROR: ' + e.reason);
        });
    </script>
</body>
</html>
